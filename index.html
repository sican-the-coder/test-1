<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Trend Mirror (Auto-Fetch UX)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f4f5f7; }
        .list-row { transition: background-color 0.15s ease; }
        .list-row:hover { background-color: #f8fafc; }
        /* 로딩 스피너 애니메이션 */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col" onload="fetchDataAutomatically()">

    <header class="bg-white border-b sticky top-0 z-20 shadow-sm">
        <div class="max-w-5xl mx-auto px-2 sm:px-4 h-14 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-extrabold text-blue-600 tracking-tight cursor-pointer" onclick="filterData('all')">
                    GAMER<span class="text-gray-800">GAG</span>
                </h1>
                <nav class="hidden sm:flex gap-1 ml-4" id="navTabs">
                    <button onclick="filterData('all')" class="nav-tab px-3 py-1.5 text-sm font-bold text-blue-600 border-b-2 border-blue-600">전체보기</button>
                    <button onclick="filterData('공식 뉴스')" class="nav-tab px-3 py-1.5 text-sm font-semibold text-gray-500 hover:text-gray-800 border-b-2 border-transparent">공식 뉴스</button>
                    <button onclick="filterData('유저 공략')" class="nav-tab px-3 py-1.5 text-sm font-semibold text-gray-500 hover:text-gray-800 border-b-2 border-transparent">유저 공략</button>
                </nav>
            </div>
            
            <div class="flex items-center gap-3">
                <div id="syncStatus" class="flex items-center gap-2 text-xs text-gray-500 font-semibold">
                    <div class="loader" id="spinner" style="display: none;"></div>
                    <span id="syncText">대기 중</span>
                </div>
                <button onclick="fetchDataAutomatically()" class="text-gray-500 hover:text-blue-600 transition" title="수동 새로고침">
                    <i class="fa-solid fa-rotate-right text-lg"></i>
                </button>
                <button onclick="exportToNotion()" class="hidden sm:flex items-center gap-1 text-xs bg-gray-800 text-white px-3 py-1.5 rounded hover:bg-gray-700 transition" id="notionBtn">
                    <i class="fa-brands fa-markdown"></i> 노션 복사
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto w-full px-2 sm:px-4 py-4 flex-grow">
        <div class="bg-white border rounded-sm shadow-sm overflow-hidden">
            <div class="hidden md:flex bg-gray-50 border-b text-xs font-semibold text-gray-500 py-2 px-3">
                <div class="w-12 text-center">순위</div>
                <div class="w-20 text-center">출처</div>
                <div class="flex-grow pl-2">제목</div>
                <div class="w-24 text-center">작성자</div>
                <div class="w-16 text-center">조회수</div>
                <div class="w-16 text-center">인기점수</div>
            </div>

            <ul id="postList" class="divide-y divide-gray-100 text-sm">
                </ul>
        </div>
    </main>

    <script>
        let globalData = [];
        let currentFilter = 'all';

        // 🚨 실무 연동 포인트: 향후 파이썬 크롤러 API가 완성되면 아래 데이터를 API 호출(fetch) 로직으로 교체합니다.
        const mockServerData = [
            { community: '인벤', title: '[단독] 신작 MMORPG 프로젝트 N, 개발 전면 취소 확정', author: '김인벤기자', views: 45000, likes: 320, link: '#' },
            { community: 'MTN뉴스', title: '넥슨, 글로벌 시장 정조준... 차기작 라인업 공개', author: '서정근', views: 12000, likes: 85, link: '#' },
            { community: '디시인사이드', title: '이번 패치로 떡상한 무기 티어 정리해준다.txt', author: '망령빌런', views: 32000, likes: 540, link: '#' },
            { community: '루리웹', title: '몬스터 헌터 와일즈 PC 사양 공개, 이거 돌아갈까요?', author: '훈타조아', views: 18000, likes: 110, link: '#' },
            { community: '디스이즈게임', title: '스팀 동접자 100만 돌파, K-게임의 반란', author: '이디겜', views: 9500, likes: 45, link: '#' },
            { community: '게임메카', title: '확률형 아이템 정보공개 의무화, 업계 반응은?', author: '박메카', views: 21000, likes: 190, link: '#' },
            { community: '인벤', title: '무과금 뉴비를 위한 초반 지역 100% 진행 가이드', author: '고인물', views: 28000, likes: 420, link: '#' },
            { community: '디시인사이드', title: '솔직히 이번 이벤트 보상 너무 창렬 아니냐?', author: '징징이', views: 4500, likes: 25, link: '#' },
            { community: 'ZDNet', title: 'MS, 액티비전 블리자드 인수 후 첫 대규모 구조조정', author: '최지넷', views: 15000, likes: 70, link: '#' }
        ];

        // 페이지 로드 시 자동으로 실행되는 동기화 함수
        function fetchDataAutomatically() {
            const listContainer = document.getElementById('postList');
            const spinner = document.getElementById('spinner');
            const syncText = document.getElementById('syncText');
            
            // UI 초기화 및 로딩 시작
            listContainer.innerHTML = '';
            spinner.style.display = 'block';
            syncText.innerText = '실시간 데이터 수집 중...';
            document.getElementById('notionBtn').style.display = 'none';

            // 서버 통신(크롤링)을 흉내내는 1.5초 타이머 (UX 목적)
            setTimeout(() => {
                processServerData(mockServerData);
                
                spinner.style.display = 'none';
                
                // 현재 시간을 동기화 완료 시간으로 표시
                const now = new Date();
                const timeString = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
                syncText.innerHTML = `<span class="text-blue-500"><i class="fa-solid fa-check"></i> 동기화 완료 (${timeString})</span>`;
                
                document.getElementById('notionBtn').style.display = 'flex';
            }, 1500);
        }

        function processServerData(dataArray) {
            const parsedData = [];

            dataArray.forEach(item => {
                let category = '자유 잡담';
                const newsKeywords = ['발표', '출시', '업데이트', '패치', '기자', '인터뷰', '단독', '리뷰', '공개'];
                const guideKeywords = ['공략', '팁', '가이드', '추천', '세팅', '티어', '모음', '정리'];
                const newsComms = ['디스이즈게임', 'MTN뉴스', '게임메카', '딜사이트', 'ZDNet'];

                // 카테고리 자동 분류 로직
                if(newsComms.some(c => item.community.toLowerCase().includes(c.toLowerCase())) || newsKeywords.some(k => item.title.includes(k))) {
                    category = '공식 뉴스';
                } else if (guideKeywords.some(k => item.title.includes(k))) {
                    category = '유저 공략';
                }

                // 가중치 10배 고정 적용
                const score = item.views + (item.likes * 10);
                parsedData.push({ ...item, category, score });
            });

            // 점수 내림차순 정렬
            globalData = parsedData.sort((a, b) => b.score - a.score);
            renderTable();
        }

        function filterData(category) {
            currentFilter = category;
            const tabs = document.querySelectorAll('.nav-tab');
            tabs.forEach(tab => {
                if(tab.innerText === category || (category === 'all' && tab.innerText === '전체보기')) {
                    tab.className = "nav-tab px-3 py-1.5 text-sm font-bold text-blue-600 border-b-2 border-blue-600";
                } else {
                    tab.className = "nav-tab px-3 py-1.5 text-sm font-semibold text-gray-500 hover:text-gray-800 border-b-2 border-transparent";
                }
            });
            renderTable();
        }

        function renderTable() {
            const listContainer = document.getElementById('postList');
            listContainer.innerHTML = '';
            const filteredData = globalData.filter(d => currentFilter === 'all' || d.category === currentFilter);

            filteredData.forEach((item, index) => {
                let commColor = 'text-gray-500';
                if(item.community.includes('루리웹')) commColor = 'text-blue-500';
                if(item.community.includes('인벤')) commColor = 'text-green-600';
                if(item.community.includes('디시')) commColor = 'text-blue-800';

                const li = document.createElement('li');
                li.className = "list-row flex items-center py-2.5 px-2 md:px-3 cursor-pointer";
                li.onclick = () => window.open(item.link, '_blank');
                
                li.innerHTML = `
                    <div class="hidden md:block w-12 text-center text-xs font-bold text-gray-300 italic">${index + 1}</div>
                    <div class="w-16 md:w-20 text-center flex-shrink-0">
                        <span class="text-[11px] font-bold ${commColor} tracking-tighter">${item.community}</span>
                    </div>
                    <div class="flex-grow pl-1 md:pl-2 min-w-0 pr-2">
                        <div class="text-[14px] font-medium text-gray-900 truncate tracking-tight hover:underline">
                            ${item.title}
                            <span class="text-[11px] text-red-500 ml-1 font-bold">[${item.likes}]</span>
                        </div>
                        <div class="md:hidden flex text-[10px] text-gray-400 mt-0.5 gap-2">
                            <span>${item.author}</span>
                            <span>조회 ${(item.views / 1000).toFixed(1)}k</span>
                        </div>
                    </div>
                    <div class="hidden md:block w-24 text-center text-xs text-gray-500 truncate px-1">${item.author}</div>
                    <div class="hidden md:block w-16 text-center text-xs text-gray-400">${item.views > 9999 ? (item.views/10000).toFixed(1)+'만' : item.views}</div>
                    <div class="w-14 md:w-16 text-right md:text-center flex-shrink-0">
                        <span class="text-xs font-bold text-red-500 bg-red-50 px-1.5 py-0.5 rounded">${item.score > 9999 ? (item.score/10000).toFixed(1)+'만' : item.score}</span>
                    </div>
                `;
                listContainer.appendChild(li);
            });
        }

        function exportToNotion() {
            if(globalData.length === 0) return alert("데이터가 없습니다.");
            let markdown = `# 🎮 GAMERGAG 트렌드 리포트\n\n| 순위 | 카테고리 | 커뮤니티 | 제목 | 작성자 | Score | 링크 |\n|:---:|:---:|:---:|:---|:---:|:---:|:---|\n`;
            globalData.slice(0, 10).forEach((item, index) => {
                markdown += `| ${index + 1} | ${item.category} | ${item.community} | ${item.title} | ${item.author} | **${item.score.toLocaleString()}** | [이동](${item.link}) |\n`;
            });
            navigator.clipboard.writeText(markdown).then(() => alert("✅ 노션용 마크다운이 복사되었습니다."));
        }
    </script>
</body>
</html>
